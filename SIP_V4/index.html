            <script type="text/javascript">
                const openedTabs = {};
                function openOrFocusTab(url) {
                        const win = window.open(url, url);

                        if (win) {
                            win.focus();
                        } else {
                            alert("Popup blocked! Please allow popups for this site.");
                        }
                    }
                    
                window.name = "index.html";
                localStorage.setItem("phoneTabOpen", "true");
                window.addEventListener("beforeunload", function () {
                    localStorage.removeItem("phoneTabOpen");
                });

                function loginUser() {
                const sipUsername = document.getElementById("loginSipUsername").value.trim();
                if (!sipUsername) {
                    alert("Please enter SIP Username");
                    return;
                }
                fetch(`https://192.168.5.57:8181/restapi/rest/api/getSipAccount/${sipUsername}`)

                // fetch(`https://192.168.5.57:8181/restapi/rest/api/getSipAccount/${sipUsername}`)
                    .then(res => {
                        if (!res.ok) throw new Error("Failed to fetch SIP account.");
                        return res.json();
                    })
                    .then(data => {
                        if (!data || !data.sipUsername) {
                            alert("Invalid user");
                            return;
                        }

                        // Save to localStorage
                        localStorage.setItem("SipUsername", data.sipUsername);
                        localStorage.setItem("SipPassword", data.sipPassword);
                        localStorage.setItem("SipDomain", data.sipDomain);
                        localStorage.setItem("wssServer", data.wssServer);
                        localStorage.setItem("WebSocketPort", data.webSocketPort);
                        localStorage.setItem("ServerPath", data.serverPath);
                        localStorage.setItem("profileName", data.profileName || data.sipUsername);

                        // Reload to initialize phone.js with these settings
                        location.reload();
                    })
                    .catch(err => {
                        console.error(err);
                        alert("Login failed. Please try again.");
                    });
            }


                function logoutUser() {
                    const SipUsername = localStorage.getItem("SipUsername");
                    const queueId = localStorage.getItem("QueueID");

                    if (!SipUsername) {
                        alert("SIP Username not found!");
                        return;
                    }

                    const isCheckedIn = localStorage.getItem("isCheckedIn") === "true";
                    const now = new Date().toISOString();
                    const today = new Date();
                    const fileDate =
                        today.getFullYear() + "-" +
                        (today.getMonth() + 1).toString().padStart(2, "0") + "-" +
                        today.getDate().toString().padStart(2, "0") +
                        " 00:00:00.000";

                    const checkoutIfNeeded = () => {
                        if (!isCheckedIn) return Promise.resolve();

                        const formData = new FormData();
                        formData.append("AgentId", SipUsername);
                        formData.append("Login_Time", now);
                        formData.append("FileDate", fileDate);

                        return fetch("https://192.168.5.60/SIPApi/api/v1/ivr/CheckOut", {
                            method: "POST",
                            body: formData
                        });
                    };

                    checkoutIfNeeded()
                    .then(() => {
                        if (!queueId) return Promise.resolve();
                        let pureAgentId = SipUsername.replace(/^webrtc_/i, "").trim();
                        const formQueue = new URLSearchParams();
                        formQueue.append("queue", queueId);
                        formQueue.append("agentId", pureAgentId);
                        return fetch("https://192.168.5.57:8181/restapi/rest/api/remove", {
                            method: "POST",
                            headers: { "Content-Type": "application/x-www-form-urlencoded" },
                            body: formQueue
                        });
                    })
                    .then(() => {
                        const logoutForm = new FormData();
                        logoutForm.append("SipUsername", SipUsername);
                        return fetch("https://192.168.5.60/SIPApi/api/v1/ivr/logout", {
                            method: "POST",
                            body: logoutForm
                        });
                    })
                    .then(() => {
                        console.log("✅ Full Logout Complete");
                        localStorage.setItem("logoutAllTabs", "true");
                        localStorage.clear();
                        window.location.href = "index.html";
                    })
                    .catch(err => {
                        console.error("❌ Logout error:", err);
                        alert("Logout failed: " + err.message);
                    });
                }
                
                const logoutBtn = document.getElementById("logoutBtn");
                if (logoutBtn) logoutBtn.onclick = logoutUser;
                
                (function(){
                    var t = localStorage.getItem('kv-theme') || 'dark';
                    document.documentElement.setAttribute('data-theme', t);
                })();

                document.getElementById('themeToggle').addEventListener('click', function() {
                    var h = document.documentElement;
                    var next = h.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
                    h.setAttribute('data-theme', next);
                    localStorage.setItem('kv-theme', next);
                    if (typeof ApplyThemeColor === 'function') ApplyThemeColor();
                });

                document.addEventListener("DOMContentLoaded", () => {
                if (localStorage.getItem("logoutAllTabs") === "true") {
                    localStorage.removeItem("logoutAllTabs");
                    localStorage.clear();
                    window.location.href = "index.html";
                    return;
                }
                    const sipUser = localStorage.getItem("SipUsername");
                    const mainNav = document.getElementById("mainNav");
                    const logoutBtn = document.getElementById("logoutBtn");
                    const agentPill = document.getElementById("agentPill");
                    const agentNameDisplay = document.getElementById("agentNameDisplay");
                    const weekHeader = document.getElementById("weekHeader");

                    if (sipUser) {
                        if (document.getElementById("loginScreen")) document.getElementById("loginScreen").style.display = "none";
                        if (document.getElementById("phoneUI")) document.getElementById("phoneUI").style.display = "block";
                        if (mainNav) mainNav.style.display = "block";
                        if (logoutBtn) logoutBtn.style.display = "flex";
                        if (agentPill) agentPill.style.display = "flex";
                        if (weekHeader) weekHeader.style.display = "block";
                        if (agentNameDisplay) agentNameDisplay.textContent = sipUser.replace(/^webrtc_/i, '');
                    } else {
                        if (document.getElementById("loginScreen")) document.getElementById("loginScreen").style.display = "block";
                        if (document.getElementById("phoneUI")) document.getElementById("phoneUI").style.display = "none";
                        if (mainNav) mainNav.style.display = "none";
                        if (logoutBtn) logoutBtn.style.display = "none";
                        if (agentPill) agentPill.style.display = "none";
                        if (weekHeader) weekHeader.style.display = "none";
                    }
                });
            </script>
